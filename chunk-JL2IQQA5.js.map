<div class="modal-overlay" (click)="close()" tabindex="-1" role="dialog" aria-modal="true">
  <div class="modal-container modal-sm" (click)="$event.stopPropagation()">

    <!-- Header -->
    <div class="modal-header">
      <div class="flex items-center gap-sm">
        <lucide-angular name="mail-plus"></lucide-angular>
        <h3 class="section-title">Inviti dipendenti</h3>
      </div>
      <button class="icon-button" (click)="close()" aria-label="Chiudi">
        <lucide-angular name="x"></lucide-angular>
      </button>
    </div>

    <!-- Body -->
    <div class="form-card flex flex-col gap-md">

      <!-- Campo email -->
      <div class="form-group">
        <label class="standard-label">
          <lucide-angular name="mail"></lucide-angular>
          Email da invitare
        </label>
        <input type="email"
               placeholder="nome@esempio.it"
               [(ngModel)]="newEmail" />
        <div *ngIf="error" class="info-message mt-sm"
             style="border-left-color: #ef4444; background: color-mix(in srgb, #ef4444 10%, transparent);">
          <lucide-angular name="circle-alert"></lucide-angular>
          {{ error }}
        </div>
      </div>

      <button class="promethea-button" (click)="aggiungi()" [disabled]="loading">
        <lucide-angular name="user-plus"></lucide-angular>
        Aggiungi
      </button>

      <!-- Divisore -->
      <div style="border-top: 1px solid var(--smoke-1); margin: var(--gap-sm) 0;"></div>

      <!-- Lista inviti vuota -->
      <div *ngIf="inviti.length === 0"
           class="flex items-center gap-sm text-muted text-mini p-sm">
        <lucide-angular name="inbox"></lucide-angular>
        Nessun invito presente
      </div>

      <!-- Lista inviti -->
      <div *ngFor="let i of inviti"
           class="flex justify-between items-center gap-sm p-sm rounded border transition hover-lift">
        <div class="flex flex-col gap-sm">
          <strong class="font-semibold">{{ i.email }}</strong>
          <span class="chip-mini">{{ i.created_at | date:'dd/MM/yyyy' }}</span>
        </div>
        <button class=icon-lucide
                (click)="rimuovi(i)"
                [disabled]="loading"
                aria-label="Rimuovi invito">
          <lucide-angular name="trash-2"></lucide-angular>
        </button>
      </div>

    </div>

  </div>
</div>
