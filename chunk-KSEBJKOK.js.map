<div class="page-container">

  <form [formGroup]="profileForm" (ngSubmit)="onSubmit()" class="profile-form">

    <!-- INFORMAZIONI DI CONTATTO -->
    <div class="form-card">
      <div class="form-row">
        <div class="form-group">
          <label class="standard-label">
            <lucide-angular name="user" [size]="20" class="nav-icon"></lucide-angular>
            Nome
          </label>
          <input type="text" [value]="userProfile?.first_name" disabled class="disabled-input" />
          <div class="text-muted text-mini mt-sm">Il nome non può essere modificato</div>
        </div>

        <div class="form-group">
          <label class="standard-label">
            <span class="material-icons">person</span>
            Cognome
          </label>
          <input type="text" [value]="userProfile?.last_name" disabled class="disabled-input" />
          <div class="text-muted text-mini mt-sm">Il cognome non può essere modificato</div>
        </div>
      </div>

      <div class="form-group">
        <label class="standard-label">
          <lucide-angular name="mail" [size]="20" class="nav-icon"></lucide-angular>
          Email
        </label>
        <input type="email" [value]="userProfile?.email" disabled class="disabled-input" />
        <div class="text-muted text-mini mt-sm">L'email non può essere modificata</div>
      </div>

      <div class="flex items-center gap-sm mb-md mt-lg">
        <span class="material-icons text-md">contact_phone</span>
        <h2 class="text-md font-semibold m-0">Informazioni di Contatto</h2>
      </div>
      
      <div class="form-row mt-sm">
        <div class="form-group">
          <label class="standard-label">
            <span class="material-icons">public</span>
            Regione
          </label>
          <select 
            formControlName="region" 
            class="standard-select"
            (change)="onRegionChange($event)">
            <option value="">Seleziona Regione</option>
            <option *ngFor="let region of regions" [value]="region">
              {{ region }}
            </option>
          </select>
        </div>

        <div class="form-group">
          <label class="standard-label">
            <span class="material-icons">map</span>
            Provincia
          </label>
          <select 
            formControlName="province" 
            class="standard-select"
            [disabled]="!filteredProvinces.length"
            (change)="onProvinceChange($event)">
            <option value="">Seleziona Provincia</option>
            <option *ngFor="let province of filteredProvinces" [value]="province.code">
              {{ province.name }}
            </option>
          </select>
          
          <!-- Messaggio informativo -->
          <div *ngIf="!filteredProvinces.length && profileForm.get('region')?.value" 
              class="text-warning text-mini mt-sm">
            <lucide-angular name="info" [size]="16"></lucide-angular>
            Nessuna provincia disponibile per questa regione
          </div>
          
          <div *ngIf="!profileForm.get('region')?.value" 
              class="text-muted text-mini mt-sm">
            <lucide-angular name="info" [size]="16"></lucide-angular>
            Seleziona prima una regione
          </div>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="standard-label">
            <span class="material-icons">phone</span>
            Telefono
          </label>
          <input type="tel" formControlName="phone" placeholder="+39 123 456 7890" />
          <div class="text-muted text-mini mt-sm">Numero per le notifiche e prenotazioni</div>
        </div>

        <div class="form-group">
          <label class="standard-label">
            <span class="material-icons">location_on</span>
            Indirizzo
          </label>
          <input type="text" formControlName="address" placeholder="Via Roma 123, Milano" />
          <div class="text-muted text-mini mt-sm">Indirizzo per consegne a domicilio</div>
        </div>
      </div>
    </div>

    <!-- Bottone di salvataggio -->
    <div class="modal-footer p-sm">
      <button type="submit" class="promethea-button" [disabled]="loading || profileForm.invalid">
        <span *ngIf="loading">Salvataggio...</span>
        <span *ngIf="!loading">Salva modifiche</span>
      </button>
      <button type="button"  class="promethea-button outline" (click)="restartTutorial()">
        <lucide-angular name="play-circle" [size]="18"></lucide-angular>
        Rivedi il tutorial
      </button>
    </div>
  </form>
</div>
