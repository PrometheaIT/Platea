<!-- image-slideshow.html - VERSIONE CON TRANSIZIONE -->
<div class="slideshow-container" (mouseenter)="stopAutoPlay()" (mouseleave)="startAutoPlay()">
  
  <!-- Container per le immagini -->
  <div class="slides-wrapper">
<!-- Immagine precedente (in transizione) -->
<div class="slide previous" 
     [class.exiting]="isTransitioning"
     [class.slide-out-next]="direction === 'next' && isTransitioning"
     [class.slide-out-prev]="direction === 'prev' && isTransitioning">
  <img *ngIf="images[previousIndex]" 
       [src]="images[previousIndex]" 
       [alt]="'Immagine ' + (previousIndex + 1)"
       (error)="onImageError($event)"
       class="slide-image"
       (click)="onImageClick(previousIndex)">   <!-- ← usa previousIndex -->
</div>

<!-- Immagine corrente -->
<div class="slide current" 
     [class.entering]="isTransitioning"
     [class.slide-in-next]="direction === 'next' && isTransitioning"
     [class.slide-in-prev]="direction === 'prev' && isTransitioning">
  <img *ngIf="images[currentIndex]" 
       [src]="images[currentIndex]" 
       [alt]="'Immagine ' + (currentIndex + 1)"
       (error)="onImageError($event)"
       class="slide-image"
       (click)="onImageClick(currentIndex)">   <!-- ← usa currentIndex -->
</div>
  </div>

  <!-- Controlli di navigazione -->
  <button class="nav-button prev" (click)="prev()" *ngIf="images.length > 1">
    <span class="material-icons">chevron_left</span>
  </button>
  <button class="nav-button next" (click)="next()" *ngIf="images.length > 1">
    <span class="material-icons">chevron_right</span>
  </button>

  <!-- Indicatori -->
  <div class="indicators" *ngIf="images.length > 1">
    <span *ngFor="let image of images; let i = index" 
          class="indicator" 
          [class.active]="i === currentIndex"
          (click)="goTo(i)">
    </span>
  </div>

</div>

<!-- Placeholder -->
<div *ngIf="images.length === 0" class="slideshow-placeholder">
  <span class="material-icons">photo_library</span>
  <p>Nessuna immagine disponibile</p>
</div>
