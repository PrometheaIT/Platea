<div class="section-header">
  <div class="flex gap-lg items-center">
    <!-- Toggle menu (visibile solo su mobile quando sidebar è chiusa) --> 
<button 
  *ngIf="showToggle" 
  class="icon-button mobile-toggle sidebar-toggle" 
  (click)="toggleMenu.emit()"
  aria-label="Apri menu">
  <lucide-angular name="menu" [size]="24"></lucide-angular>
</button>
    <div class="flex gap-md items-center">
    <!-- Icona della pagina -->
    <lucide-angular [name]="icon"></lucide-angular>

    <!-- Titolo della pagina -->
    <h1 class="section-title">{{ title }}</h1>
    </div>
  </div>
</div>
