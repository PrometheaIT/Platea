<div class="promethea-loader" *ngIf="isLoading">
  <div class="loader-content">
    <!-- Piatto che si "riempie" con il gradiente -->
    <div class="plate">
      <div class="food-wave"></div>
      <div class="food-wave delay-1"></div>
      <div class="food-wave delay-2"></div>
    </div>

    <!-- Testo animato -->
    <div class="loader-text ">
      <span class="letter">P</span>
      <span class="letter">r</span>
      <span class="letter">e</span>
      <span class="letter">p</span>
      <span class="letter">a</span>
      <span class="letter">r</span>
      <span class="letter">a</span>
      <span class="letter">n</span>
      <span class="letter">d</span>
      <span class="letter">o</span>
      <span class="letter">.</span>
      <span class="letter">.</span>
      <span class="letter">.</span>
    </div>

    <p class="text-muted mt-lg">Stiamo cucinando i tuoi dati</p>
  </div>
</div>
