<app-header 
  [title]="isRestaurant ? 'Registra il tuo Ristorante' : 'Crea Account'"
  [icon]="isRestaurant ? 'utensils-crossed' : 'user'"
  [showToggle]="false">
</app-header>

<div class="login-page page-container">

  <!-- sfondo animato -->
  <div class="login-bg" aria-hidden="true">
    <div class="login-blob login-blob--1"></div>
    <div class="login-blob login-blob--2"></div>
    <div class="login-blob login-blob--3"></div>
    <div class="login-aurora"></div>
    <div class="login-grid"></div>
  </div>

  <!-- Card centrato -->
  <div class="register-center">
    <div class="login-card register-card">

      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="generic-form">

        <!-- Informazioni Personali -->
        <h2 class="text-md font-semibold mb-md flex gap-sm items-center">
          <lucide-icon name="user" [size]="20" class="nav-icon"></lucide-icon>
          Informazioni Personali
        </h2>

        <div class="form-row mb-md">
          <div class="form-group">
            <label class="standard-label">Nome *</label>
            <input formControlName="firstName" placeholder="Il tuo nome" type="text"
                   [class.error]="firstName?.invalid && firstName?.touched">
            <div *ngIf="firstName?.invalid && firstName?.touched" class="login-field-error">
              Il nome è obbligatorio
            </div>
          </div>

          <div class="form-group">
            <label class="standard-label">Cognome *</label>
            <input formControlName="lastName" placeholder="Il tuo cognome" type="text"
                   [class.error]="lastName?.invalid && lastName?.touched">
            <div *ngIf="lastName?.invalid && lastName?.touched" class="login-field-error">
              Il cognome è obbligatorio
            </div>
          </div>
        </div>

        <div class="form-row mb-md">
          <div class="form-group">
            <label class="standard-label">Email *</label>
            <input formControlName="email" type="email" placeholder="tua.email@esempio.com"
                   [class.error]="email?.invalid && email?.touched">
            <div *ngIf="email?.invalid && email?.touched" class="login-field-error">
              <span *ngIf="email?.errors?.['required']">Email obbligatoria</span>
              <span *ngIf="email?.errors?.['email']">Email non valida</span>
            </div>
          </div>

          <div class="form-group">
            <label class="standard-label">Telefono</label>
            <input formControlName="phone" placeholder="+39 123 456 7890" type="number">
          </div>
        </div>

        <!-- Informazioni Ristorante -->
        <div *ngIf="isRestaurant" class="mb-md">
          <h2 class="text-md font-semibold mb-md flex gap-sm items-center">
            <lucide-icon name="building-2" [size]="20" class="nav-icon"></lucide-icon>
            Informazioni Ristorante
          </h2>

          <div class="form-group">
            <label class="standard-label">Nome Ristorante *</label>
            <input formControlName="restaurantName" placeholder="Il nome del tuo ristorante" type="text"
                   [class.error]="restaurantName?.invalid && restaurantName?.touched">
            <div *ngIf="restaurantName?.invalid && restaurantName?.touched" class="login-field-error">
              Il nome del ristorante è obbligatorio
            </div>
          </div>
        </div>

        <!-- Password -->
        <div class="mt-lg mb-md">
          <h2 class="text-md font-semibold mb-md flex gap-sm items-center">
            <lucide-icon name="lock" [size]="20" class="nav-icon"></lucide-icon>
            Password
          </h2>

          <div class="form-row">
            <div class="form-group">
              <label class="standard-label">Password *</label>
              <div class="login-input-wrap">
                <input
                  formControlName="password"
                  [type]="showPassword ? 'text' : 'password'"
                  placeholder="Almeno 6 caratteri"
                  [class.error]="password?.invalid && password?.touched">
                <button type="button" class="login-eye-btn" (click)="togglePasswordVisibility()">
                  <lucide-icon [name]="showPassword ? 'eye-off' : 'eye'" [size]="18"></lucide-icon>
                </button>
              </div>
              <div *ngIf="password?.invalid && password?.touched" class="login-field-error">
                Password obbligatoria (min. 6 caratteri)
              </div>
            </div>

            <div class="form-group">
              <label class="standard-label">Conferma Password *</label>
              <div class="login-input-wrap">
                <input
                  formControlName="confirmPassword"
                  [type]="showConfirmPassword ? 'text' : 'password'"
                  placeholder="Ripeti la password"
                  [class.error]="registerForm.errors?.['passwordMismatch'] && confirmPassword?.touched">
                <button type="button" class="login-eye-btn" (click)="toggleConfirmPasswordVisibility()">
                  <lucide-icon [name]="showConfirmPassword ? 'eye-off' : 'eye'" [size]="18"></lucide-icon>
                </button>
              </div>
              <div *ngIf="registerForm.errors?.['passwordMismatch'] && confirmPassword?.touched" class="login-field-error">
                Le password non coincidono
              </div>
            </div>
          </div>
        </div>

        <!-- Privacy Policy -->
        <div class="flex items-center my-md">
          <label class="checkbox-label">
            <input type="checkbox" formControlName="policy">
            <div class="checkbox-content text-muted">
              Dichiaro di aver letto, compreso e accettato la
              <a href="#/policy" class="link">Privacy Policy e i Termini e Condizioni</a>
            </div>
          </label>
        </div>

        <!-- Errore globale -->
        <div *ngIf="errorMessage" class="login-message login-message--error mb-md">
          <lucide-icon name="alert-triangle" [size]="16"></lucide-icon>
          {{ errorMessage }}
        </div>

        <!-- Azioni -->
        <div class="login-divider mb-md"></div>

        <div class="flex justify-between items-center gap-md">
          <a routerLink="/login" class="link">
            ← Hai già un account?
          </a>
          <button type="submit" [disabled]="registerForm.invalid || isLoading" class="promethea-button">
            <span *ngIf="isLoading" class="loading-spinner"></span>
            <lucide-icon *ngIf="!isLoading" name="user-check" [size]="18"></lucide-icon>
            <span>{{ isRestaurant ? 'Registra Ristorante' : 'Crea Account' }}</span>
          </button>
        </div>

      </form>
    </div>
  </div>

</div>
